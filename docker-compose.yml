services:
  postgres:
    image: postgres:16-alpine
    container_name: scheduling-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: scheduling_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d scheduling_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
